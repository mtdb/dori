[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "mnemo8"
version = "0.1.0"
description = "mnemo8 MVP Terminal Assistant"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "rich>=13.0.0",
    "ollama>=0.2.0",
    "textual>=0.52.0",
]

[project.scripts]
mnemo8 = "mnemo8.main:run"

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.setuptools]
packages = ["mnemo8"]
